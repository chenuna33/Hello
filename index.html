<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 紫色生活流水帳 - Web App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f7ff; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass-header { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); position: sticky; top: 0; z-index: 50; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .category-label-input { background: transparent; border: none; width: 100%; font-size: 10px; color: #6d28d9; font-weight: 800; text-align: center; outline: none; }
        .item-note-input { font-size: 9px; padding: 1px 2px; border-radius: 4px; border: 1px dashed #ddd; width: 100%; height: 18px; margin-bottom: 2px; outline: none; background: #fff; text-align: center; color: #666; }
        .day-card { background: white; border-radius: 1rem; padding: 0.8rem; box-shadow: 0 2px 10px rgba(139, 92, 246, 0.08); border: 1px solid #f3f0ff; margin-bottom: 1rem; }
        .item-box { background-color: #fcfbff; border-radius: 8px; padding: 4px; border: 1px solid #f0edff; display: flex; flex-direction: column; align-items: center; min-height: 52px; justify-content: space-between; }
        .featured-box { background-color: #f5f3ff; border: 1px solid #e9e4ff; }
        
        .wallet-zone { background: #f3f2ff; border-radius: 0.75rem; padding: 0.5rem 0.6rem; flex-grow: 1; display: flex; flex-direction: column; gap: 0.4rem; overflow: hidden; }
        .wallet-row { display: flex; align-items: center; width: 100%; gap: 0.4rem; }
        .wallet-group { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
        .wallet-input { background: white; border-radius: 6px; text-align: center; font-weight: 900; font-size: 13px; color: #4338ca; border: 1px solid #dbeafe; width: 3.3rem; padding: 2px 0; outline: none; }
        
        .source-input { background: white; border-radius: 6px; text-align: left; font-weight: 700; font-size: 11px; color: #8b5cf6; border: 1px solid #dbeafe; flex-grow: 1; padding: 2.5px 8px; outline: none; transition: all 0.2s; }
        .source-input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.1); }
        
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #8b5cf6; border-radius: 50%; width: 28px; height: 28px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .month-header { display: flex; justify-content: center; align-items: center; margin: 1.5rem 0 1rem 0; padding: 0.5rem; }
        .month-pill { background-color: #f5f3ff; border: 1px solid #ddd6fe; border-left: 6px solid #8b5cf6; padding: 4px 24px; border-radius: 8px; color: #5b21b6; font-weight: 900; font-size: 1.25rem; box-shadow: 0 2px 4px rgba(139, 92, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-24">
    <header class="glass-header text-white shadow-lg p-2.5">
        <div class="max-w-5xl mx-auto flex justify-between items-center px-1">
            <div class="flex flex-col">
                <h1 class="text-lg font-black tracking-tight leading-none">💜 2026 生活流水帳</h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <span id="syncStatus" class="inline-block w-2 h-2 rounded-full bg-yellow-400"></span>
                    <p class="text-[10px] text-purple-100 font-bold" id="statusText">同步中...</p>
                </div>
            </div>
            <div class="flex gap-4 text-right items-center">
                <div class="flex flex-col">
                    <span class="text-[8px] opacity-80 font-bold">今日花費</span>
                    <span class="text-lg font-black" id="totalExpenseToday">$ 0</span>
                </div>
                <div class="flex flex-col border-l border-white/30 pl-4">
                    <span class="text-[8px] opacity-80 font-bold">年底預計總餘額</span>
                    <span class="text-lg font-black text-yellow-300" id="finalWalletBalance">$ 0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-3">
        <div id="expenseList" class="space-y-4 flex flex-col items-center justify-center min-h-[20vh]">
            <div class="loading-spinner mb-4 mt-8"></div>
            <p id="loadingMsg" class="text-purple-500 font-black text-sm">正在載入數據...</p>
            <button id="forceLocalBtn" onclick="forceLoadLocal()" class="hidden mt-6 bg-purple-600 text-white px-6 py-2.5 rounded-full text-sm font-black shadow-lg">⚡️ 讀取手機備份</button>
        </div>
    </main>

    <div id="saveIndicator" class="fixed bottom-6 right-6 bg-black/80 text-white text-[11px] px-4 py-1.5 rounded-full opacity-0 pointer-events-none z-50 transition-opacity duration-300 font-bold">
        ✅ 已更新
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const START_DATE_STR = '2026-03-26';
        const END_DATE_STR = '2026-12-31';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'purple-expense-2026';
        const LOCAL_KEY = `data_${appId}`;
        const LABEL_KEY = `labels_${appId}`;

        const categories = [
            { key: 'breakfast', label: '早餐', icon: '🥐', hasNote: true, isCash: true },
            { key: 'lunch', label: '午餐', icon: '🍱', hasNote: true, isCash: true },
            { key: 'dinner', label: '晚餐', icon: '🥘', hasNote: true, isCash: true },
            { key: 'drink', label: '飲料', icon: '🧋', hasNote: true, isCash: true },
            { key: 'smoke', label: '煙', icon: '🚬', isCash: true },
            { key: 'family', label: '家庭開銷', icon: '🏠', hasNote: true, isCash: true },
            { key: 'bill', label: '繳費', icon: '💸', hasNote: true, isCash: true },
            { key: 'others', label: '自訂1', icon: '🎀', editable: true, hasNote: true, isCash: true },
            { key: 'others2', label: '自訂2', icon: '🌸', editable: true, hasNote: true, isCash: true },
            { key: 'others3', label: '自訂3', icon: '🌷', editable: true, hasNote: true, isCash: true },
            { key: 'card1', label: '刷卡A', icon: '💳', editable: true, hasNote: true, isCash: false },
            { key: 'card2', label: '刷卡B', icon: '💳', editable: true, hasNote: true, isCash: false }
        ];

        let allData = JSON.parse(localStorage.getItem(LOCAL_KEY) || '{}');
        let customLabels = JSON.parse(localStorage.getItem(LABEL_KEY) || '{}');
        let currentUser = null;
        let isCloud = false;
        let rendered = false;

        const timeout = setTimeout(() => { if (!rendered) document.getElementById('forceLocalBtn').classList.remove('hidden'); }, 4500);

        window.forceLoadLocal = () => { if (rendered) return; renderList(); document.getElementById('statusText').innerText = '模式：手機本地備份'; document.getElementById('syncStatus').className = 'inline-block w-2 h-2 rounded-full bg-blue-400'; };

        try {
            const config = JSON.parse(__firebase_config);
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);

            const startAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            };
            startAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    isCloud = true;
                    clearTimeout(timeout);
                    document.getElementById('syncStatus').className = 'inline-block w-2 h-2 rounded-full bg-green-400';
                    document.getElementById('statusText').innerText = '雲端同步中';
                    onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'all'), (snap) => {
                        if (snap.exists()) { allData = snap.data(); localStorage.setItem(LOCAL_KEY, JSON.stringify(allData)); }
                        renderList();
                    });
                    onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'labels'), (snap) => {
                        if (snap.exists()) { customLabels = snap.data(); localStorage.setItem(LABEL_KEY, JSON.stringify(customLabels)); if(rendered) renderList(); }
                    });
                    window.doSync = async () => {
                        if (!currentUser) return;
                        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'data', 'all'), allData);
                        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'labels'), customLabels);
                        const i = document.getElementById('saveIndicator'); i.style.opacity = '1'; setTimeout(() => i.style.opacity = '0', 1000);
                    };
                }
            });
        } catch (e) { forceLoadLocal(); }

        function renderList() {
            rendered = true;
            const container = document.getElementById('expenseList');
            container.classList.remove('items-center', 'justify-center', 'min-h-[20vh]');
            container.classList.add('mt-1');

            let html = '';
            let current = new Date(START_DATE_STR);
            const end = new Date(END_DATE_STR);

            while (current <= end) {
                const ds = current.toISOString().split('T')[0];
                const dow = ['日', '一', '二', '三', '四', '五', '六'][current.getDay()];
                const isW = current.getDay() === 0 || current.getDay() === 6;
                const dp = ds.split('-');

                if (current.getDate() === 1 || ds === START_DATE_STR) {
                    html += `
                        <div class="month-header">
                            <div class="month-pill">${parseInt(dp[1])}月</div>
                        </div>`;
                }

                const d = allData[ds] || {};
                html += `
                    <div class="day-card">
                        <div class="flex items-center gap-3 border-b-2 border-purple-50 pb-2 mb-2">
                            <!-- 日期區塊 -->
                            <div class="${isW ? 'text-red-500' : 'text-purple-600'} shrink-0 text-center border-r-2 border-purple-100 pr-3 min-w-[75px]">
                                <div class="text-lg font-black opacity-80 leading-none">${dp[1]}/${dp[2]}</div>
                                <div class="text-2xl font-black mt-1 leading-none">週${dow}</div>
                            </div>
                            
                            <div class="wallet-zone">
                                <div class="wallet-row">
                                    <div class="wallet-group">
                                        <span class="text-[8px] font-black text-purple-500 leading-tight">錢包<br>金額</span>
                                        <input type="number" oninput="u('${ds}','base',this.value)" value="${d.base||''}" class="wallet-input">
                                    </div>
                                    <div class="wallet-group">
                                        <span class="text-[8px] font-black text-blue-500 leading-tight">拿取</span>
                                        <input type="number" oninput="u('${ds}','draw',this.value)" value="${d.draw||''}" class="wallet-input !text-blue-700 !border-blue-100">
                                    </div>
                                    <!-- 縮小後的剩下金額顯示 -->
                                    <div class="flex-grow flex items-center justify-end border-l-2 border-purple-200 pl-3 gap-1.5">
                                        <span class="text-[9px] font-black text-gray-400">剩下:</span>
                                        <span class="text-sm font-black text-purple-700" id="wrem-${ds}">$0</span>
                                    </div>
                                </div>
                                <div class="wallet-row">
                                    <span class="text-[8px] font-black text-purple-500 shrink-0">來源:</span>
                                    <input type="text" 
                                           oninput="u('${ds}','src',this.value)" 
                                           value="${d.src||''}" 
                                           placeholder="輸入資金來源..." 
                                           class="source-input">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-2">
                            ${categories.map(c => `
                                <div class="item-box featured-box ${!c.isCash ? '!bg-blue-50/50 !border-blue-100' : ''}">
                                    <input type="text" value="${customLabels[c.key]||c.label}" ${!c.editable?'readonly':''} onblur="ul('${c.key}',this.value)" class="category-label-input ${!c.isCash ? '!color-blue-600' : ''}">
                                    ${c.hasNote ? `<input type="text" oninput="u('${ds}','${c.key}_n',this.value)" value="${d[c.key+'_n']||''}" placeholder="..." class="item-note-input">` : ''}
                                    <div class="flex items-center justify-end w-full px-1">
                                        <span class="text-[10px] mr-auto">${c.icon}</span>
                                        <input type="number" oninput="u('${ds}','${c.key}',this.value)" value="${d[c.key]||''}" class="w-2/3 text-right text-sm font-black bg-transparent outline-none text-purple-900">
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="flex justify-between mt-3 pt-2 border-t border-gray-50 items-center">
                            <div class="text-[10px] font-black text-gray-400 tracking-tight">
                                口袋剩餘: <span id="pkt-${ds}" class="text-sm ml-1">$0</span>
                            </div>
                            <div class="text-[10px] font-black text-purple-400 tracking-tight">
                                本日花費: <span id="exp-${ds}" class="text-base ml-1 text-purple-700">$0</span>
                            </div>
                        </div>
                    </div>
                `;
                current.setDate(current.getDate() + 1);
            }
            container.innerHTML = html;
            calc();
        }

        window.u = (d, t, v) => {
            if(!allData[d]) allData[d] = {};
            allData[d][t] = v;
            localStorage.setItem(LOCAL_KEY, JSON.stringify(allData));
            calc();
            if(isCloud) { clearTimeout(window.syncT); window.syncT = setTimeout(() => window.doSync(), 800); }
        };

        window.ul = (k, v) => { customLabels[k] = v; localStorage.setItem(LABEL_KEY, JSON.stringify(customLabels)); if(isCloud) window.doSync(); };

        function calc() {
            let run = 0;
            let current = new Date(START_DATE_STR);
            while (current <= new Date(END_DATE_STR)) {
                const ds = current.toISOString().split('T')[0];
                const d = allData[ds] || {};
                let b = (d.base !== undefined && d.base !== '') ? Number(d.base) : run;
                let dr = Number(d.draw) || 0;
                let dayTotalEx = 0; let dayCashEx = 0;  
                categories.forEach(c => { const val = Number(d[c.key]) || 0; dayTotalEx += val; if(c.isCash) dayCashEx += val; });
                let pkt = dr - dayCashEx; let wRem = b - dr; run = wRem + pkt;
                if(document.getElementById(`wrem-${ds}`)) document.getElementById(`wrem-${ds}`).innerText = `$${wRem.toLocaleString()}`;
                if(document.getElementById(`exp-${ds}`)) document.getElementById(`exp-${ds}`).innerText = `$${dayTotalEx.toLocaleString()}`;
                if(document.getElementById(`pkt-${ds}`)) { const el = document.getElementById(`pkt-${ds}`); el.innerText = `$${pkt.toLocaleString()}`; el.className = pkt < 0 ? 'text-sm font-black text-red-500 ml-1' : 'text-sm font-black text-green-600 ml-1'; }
                current.setDate(current.getDate() + 1);
            }
            document.getElementById('finalWalletBalance').innerText = `$ ${run.toLocaleString()}`;
            const tStr = new Date().toISOString().split('T')[0];
            let tS = 0; if(allData[tStr]) categories.forEach(c => tS += (Number(allData[tStr][c.key]) || 0));
            document.getElementById('totalExpenseToday').innerText = `$ ${tS.toLocaleString()}`;
        }
    </script>
</body>
</html>
